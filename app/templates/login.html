<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Leash NDI Source Control</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-body">

<div class="w-100" style="max-width: 380px; padding: 1rem">

  <!-- Brand -->
  <div class="text-center mb-4">
    <div class="fw-bold text-warning fs-3">
      <i class="bi bi-broadcast-pin me-2"></i>Leash
    </div>
    <div class="text-muted small">NDI Source Control</div>
  </div>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  {% for category, message in messages %}
  <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
    {{ message }}
    <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
  {% endif %}
  {% endwith %}

  <!-- Login card -->
  <div class="card border-secondary">
    <div class="card-body p-4">
      <h5 class="card-title mb-4">Sign In</h5>

      <form method="post" action="{{ url_for('auth.login_post') }}" autocomplete="on">
        <input type="hidden" name="csrf_token" value="{{ session['_csrf_token'] }}">
        <input type="hidden" name="next" value="{{ next }}">

        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control" id="username" name="username"
                 autocomplete="username" autofocus required>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password"
                 autocomplete="current-password" required>
        </div>

        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-warning">
            <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
          </button>
        </div>

        {% if auth_forgot_url %}
        <div class="text-center">
          <a href="{{ auth_forgot_url }}" class="small text-muted" target="_blank" rel="noopener">
            Forgot password?
          </a>
        </div>
        {% endif %}
      </form>
    </div>
  </div>

  <div class="text-center mt-3">
    <small class="text-secondary">
      v{{ config.LEASH_VERSION }}
    </small>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
