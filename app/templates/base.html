<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Leash — NDI Source Control{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-baseline gap-2 text-decoration-none"
       href="{{ url_for('main.index') }}">
      <span class="fw-bold text-warning"><i class="bi bi-broadcast-pin me-1"></i>Leash</span>
      <small class="text-light fw-normal" style="font-size:0.65em;opacity:0.7;letter-spacing:0.03em">
        NDI Source Control
      </small>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}"
             href="{{ url_for('main.index') }}">
            <i class="bi bi-grid-3x3-gap me-1"></i>Receivers
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.groups' %}active{% endif %}"
             href="{{ url_for('main.groups') }}">
            <i class="bi bi-tags me-1"></i>Groups
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'layout' in (request.endpoint or '') %}active{% endif %}"
             href="{{ url_for('main.layouts') }}">
            <i class="bi bi-layout-three-columns me-1"></i>Layouts
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.snapshots' %}active{% endif %}"
             href="{{ url_for('main.snapshots') }}">
            <i class="bi bi-camera me-1"></i>Snapshots
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.sources' %}active{% endif %}"
             href="{{ url_for('main.sources') }}">
            <i class="bi bi-collection-play me-1"></i>Sources
          </a>
        </li>
      </ul>
      <div class="d-flex gap-2 flex-wrap">
        <button id="btn-scan" class="btn btn-sm btn-outline-primary" title="Scan subnet for BirdDog PLAY devices">
          <i class="bi bi-search me-1"></i>Scan Network
        </button>
        <button id="btn-bulk-reload" class="btn btn-sm btn-outline-info" title="Reload all receiver status">
          <i class="bi bi-arrow-repeat me-1"></i>Reload All
        </button>
        <button id="btn-discover" class="btn btn-sm btn-outline-warning" title="Discover NDI sources on network">
          <i class="bi bi-radar me-1"></i>Discover Sources
        </button>
      </div>
    </div>
  </div>
</nav>

<!-- Scan result modal -->
<div class="modal fade" id="scanResultModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-search me-2"></i>Network Scan Results</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="scan-result-body">
        <div class="loader-overlay"><span class="spinner-border me-2"></span>Scanning 10.1.248.1–254…</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button class="btn btn-primary" id="btn-scan-reload-page" style="display:none"
                onclick="location.reload()">Refresh Page</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>

<main class="container-fluid py-3">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
