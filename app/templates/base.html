<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Leash — NDI Receiver Control{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-warning" href="{{ url_for('main.index') }}">
      <i class="bi bi-broadcast-pin me-1"></i>Leash
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}"
             href="{{ url_for('main.index') }}">
            <i class="bi bi-grid-3x3-gap me-1"></i>Receivers
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.sources' %}active{% endif %}"
             href="{{ url_for('main.sources') }}">
            <i class="bi bi-collection-play me-1"></i>Sources
          </a>
        </li>
      </ul>
      <div class="d-flex gap-2">
        <button id="btn-bulk-reload" class="btn btn-sm btn-outline-info" title="Reload all receiver status">
          <i class="bi bi-arrow-repeat me-1"></i>Reload All
        </button>
        <button id="btn-discover" class="btn btn-sm btn-outline-warning" title="Discover NDI sources on network">
          <i class="bi bi-radar me-1"></i>Discover Sources
        </button>
      </div>
    </div>
  </div>
</nav>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>

<main class="container-fluid py-3">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
